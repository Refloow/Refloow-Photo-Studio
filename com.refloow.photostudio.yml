app-id: com.refloow.photostudio
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: refloow-photo-studio
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --share=network
modules:
  - name: refloow-photo-studio
    buildsystem: simple
    build-commands:
      - ar x refloow-photo-studio.deb
      - tar xf data.tar.xz
      - cp -r opt/Refloow-Photo-Studio/* /app/
      - cp -r usr/share/icons /app/share/
      - cp -r usr/share/applications /app/share/
      - install -Dm755 refloow-photo-studio.sh /app/bin/refloow-photo-studio
    sources:
      - type: file
        url: https://github.com/Refloow/Refloow-Photo-Studio/releases/download/1.0.0/refloow-photo-studio_1.0.0_amd64.deb
        sha256: 2a999ac895f253b5f0a11074eed1524dfa83d034287f6a18bca0a9e838aae8fe
        x-checker-data:
          type: html
          url: https://api.github.com/repos/Refloow/Refloow-Photo-Studio/releases/latest
          version-pattern: '"tag_name": "([0-9.]+)"'
          url-template: https://github.com/Refloow/Refloow-Photo-Studio/releases/download/$version/refloow-photo-studio_$version_amd64.deb
